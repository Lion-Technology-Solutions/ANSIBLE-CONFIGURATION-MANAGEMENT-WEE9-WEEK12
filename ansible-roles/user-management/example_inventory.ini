# Example Ansible inventory for user-management role

[webservers]
web1.example.com
web2.example.com

[databases]
db1.example.com
db2.example.com

[all_servers:children]
webservers
databases

# Inventory variables for user-management role
[all_servers:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa

# Define default teams for all servers
teams:
  - name: developers
    gid: 2001
  - name: devops
    gid: 2002
  - name: admins
    gid: 2099

# Define default users for all servers
users:
  - username: alice
    uid: 1001
    group: developers
    team: developers
    is_admin: false
    joined_date: "2024-01-15"
    public_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI..." # Replace with real key
    shell: "/bin/bash"
  
  - username: bob
    uid: 1002
    group: devops
    team: devops
    is_admin: true
    joined_date: "2024-01-10"
    public_keys:
      - "ssh-rsa AAAB3NzaC1yc2EAAAADAQABAAABgQC..." # Replace with real key
    shell: "/bin/bash"
  
  - username: carter
    uid: 1003
    group: developers
    team: developers
    is_admin: false
    joined_date: "2024-02-01"
    public_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI..." # Replace with real key
    shell: "/bin/bash"
