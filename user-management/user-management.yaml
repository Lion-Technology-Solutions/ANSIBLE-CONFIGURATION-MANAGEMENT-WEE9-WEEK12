- name: User Management with Conditions and Variables
  hosts: aws_ec2
  become: yes

  vars_files:
    - vars/users.yaml

  tasks:

    # 🔹 Create groups (if not exist)
    - name: Ensure groups exist
      group:
        name: "{{ item.group }}"
        state: present
      loop: "{{ users }}"

    # 🔹 Create users
    - name: Create users with password
      user:
        name: "{{ item.username }}"
        password: "{{ item.password }}"
        group: "{{ item.group }}"
        create_home: yes
        shell: /bin/bash
      loop: "{{ users }}"

    # 🔹 Grant sudo access (ONLY if admin = true)
    - name: Add admin users to sudo group
      user:
        name: "{{ item.username }}"
        groups: sudo
        append: yes
      when: item.admin == true
      loop: "{{ users }}"

    # 🔹 Deploy SSH public keys
    - name: Add SSH keys for users
      authorized_key:
        user: "{{ item.username }}"
        key: "{{ lookup('file', item.pub_key) }}"
      loop: "{{ users }}"

    # 🔹 Enable password authentication in SSH
    - name: Enable password authentication in SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication yes'
        backup: yes

    # 🔹 Restart SSH service
    - name: Restart SSH service
      service:
        name: ssh
        state: restarted