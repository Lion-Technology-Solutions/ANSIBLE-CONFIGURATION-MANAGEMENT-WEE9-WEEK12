---
- name: Install Git, Nginx, and Apache on Ubuntu
  hosts: db
  become: yes
  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Install Apache2
      apt:
        name: apache2
        state: present

    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Start and enable Apache2
      systemd:
        name: apache2
        state: started
        enabled: yes
