---
- name: Install Apache on RedHat and Amazon Linux 2
  hosts: all
  become: yes
  tasks:
    - name: Update yum package cache
      yum:
        update_cache: yes
      when: ansible_os_family == 'RedHat'

    - name: Install Apache on RedHat-based systems
      yum:
        name: httpd
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Start and enable Apache
      systemd:
        name: httpd
        state: started
        enabled: yes
      when: ansible_os_family == 'RedHat'
